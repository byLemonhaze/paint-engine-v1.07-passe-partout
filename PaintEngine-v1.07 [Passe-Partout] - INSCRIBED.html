    <!--

INSTRUCTIONS

----------------------------------------
KEYBOARD SHORTCUTS:
  [g]  Generate new artwork (randomize all)
  [i]  Iterate (new layout, keep palette/seed)
  [b]  Go back to previous state
  [w]  Toggle seed info panel
  [s]  Save/Download current artwork as PNG
  [#]  Open Grid View (batch generation)
  [l]  Open Collection (Favorites)
  
  [c]  Open Customization Menu:
      [p]  Palette selector
      [r]  Aspect Ratio selector
      [z]  Brush Mode (Uno/Dos)
      [t]  Texture modes (Hatch/Grain)
      [f]  Frame styles

MOUSE:
  Click card → Flip to view metadata
  Hover → Tactile glare effect
  Click modal background → Close
  Click "C" → Toggle Customization Bar

COLLECTION & EXPORT:
  [v]  Favorite/Unfavorite current artwork
  [l]  Open Collection (manage favorites)
  
  Inside Collection:
  - View as Grid: See all favorites nicely arranged
  - Export ZIP: Download all favorites as high-res PNGs + metadata
  - Delete All: Clear your collection

CONTROLS (bottom):
  W   Toggle info panel
  ←   Back in history
  G   Generate (full random)
  I   Iterate (new layout)
  C   Customization Menu > (P, R, Z, T, F)
  F   Frame
  #   Grid View
  Ø   Bg Toggle
  ⌸   View Source
  ↓   Download PNG

SEED INFO PANEL (bottom-left, press W):
  - View/edit Master Seed for deterministic output
  - Edit individual params (Seed, P-Tag, I-Tag)
  - Click Master Seed field to copy
  - Press LOAD to apply Master Seed

GRID VIEW:
  - Batch generate variations
  - Filter by palette
  - Toggle background (Ø)
  - Adjust density slider
  - Click artwork → Preview with metadata
  - Download individual pieces

MASTER SEED FORMAT:
  P[palette][iteration]B[bg]M[brush]T[texture]F[frame]S[seed]
  Example: P21z458900B0M0T1F1S1769393823145

ASPECT RATIOS:

  X-Trash (fast) → Trash (standard) → Mellow (high-res)
  Default: 1:2 X-Trash (324x648)

FRAMES:
  - None, Simple Frame, In-Thick (inset mat), Three-Thick
  - In-Thick hidden for X-Trash sizes (auto-filtered)

Made with Javascript
-->


    <style>
        /* --- CSS RESET & BASE --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        canvas {
            display: block;
            outline: none;
        }

        body {
            margin: 0;
            background: transparent;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            cursor: pointer;
        }

        body.controls-visible {
            cursor: default;
        }

        /* --- LOADING INDICATOR --- */
        #main-container {
            transition: padding-bottom 0.3s ease;
        }

        #loading-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #loading-indicator.active {
            display: flex;
        }

        /* Blur the modal overlays when loading */
        .modal-overlay.blur-active {
            filter: blur(4px);
            pointer-events: none;
        }

        .loading-square {
            width: 48px;
            height: 48px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .loading-square::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            animation: fillSquare 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes fillSquare {
            0% {
                transform: translateY(100%);
            }

            50% {
                transform: translateY(0%);
            }

            100% {
                transform: translateY(-100%);
            }
        }

        .loading-text {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* --- UI CONTROLS --- */
        /* #generator-controls replaced by body styles for 4-corner menu */

        #generator-controls button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            font-family: monospace;
            border-radius: 50%;
            /* CIRCULAR */
            cursor: pointer;
            position: relative;
            /* Responsive sizing */
            flex: 0 0 auto;
            width: 7vmin;
            height: 7vmin;
            max-width: 40px;
            max-height: 40px;
            min-width: 28px;
            min-height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(10px, 2.5vmin, 14px);
            padding: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Bouncy pop */
        }

        /* Responsive Logic */
        @media (orientation: landscape) {
            #generator-controls {
                margin-bottom: 2vh;
            }

            #generator-controls button {
                width: 6vh;
                height: 6vh;
                font-size: 2.2vh;
            }
        }

        /* Tiny embed safety */
        @media (max-width: 400px) {
            #generator-controls {
                width: 95%;
                /* fallback to wider if too tight */
                border-radius: 20px;
                justify-content: space-between;
                gap: 2px;
                padding: 4px;
            }

            #generator-controls button {
                border-radius: 6px;

                width: 11vmin;
                height: 11vmin;
            }
        }

        #generator-controls button .btn-tag {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            padding: 0;
            font-size: 0;
            background: #FFFFFF;
            opacity: 0;
        }

        #generator-controls button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
            z-index: 10;
        }

        #generator-controls button:active {
            transform: scale(0.95);
        }

        #generator-controls button:disabled {
            opacity: 0.3;
            filter: grayscale(1);
            cursor: not-allowed;
        }

        /* --- CAROUSEL --- */
        #carousel-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
            overflow: hidden;
        }

        .card-wrapper {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 300px;
            height: 300px;
            cursor: pointer;
            transition: width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), height 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.6s;
            transform-style: preserve-3d;
            will-change: transform, opacity, width, height;
            transform: translate(-50%, -50%);
            /* Base centering */
            background: transparent;
            font-size: 0;
            line-height: 0;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.3, 0, 0.1, 1);
            transform-style: preserve-3d;
        }

        .card-wrapper.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 40px 100px -10px rgba(0, 0, 0, 1);
            background: transparent;
            transform: translateZ(0);
        }

        .card-back {
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transform: rotateY(180deg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            color: #fff;
            text-align: left;
            overflow: hidden;
            container-type: size;
            /* Crucial for cqh units */
        }

        .card-back::after {
            content: '';
            position: absolute;
            inset: 1.5cqh;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            pointer-events: none;
            z-index: 10;
        }

        .card-back-content {
            width: 100%;
            height: 100%;
            padding: 5cqh 5.5cqh;
            /* Tighter padding */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        /* Responsive fonts based on container height */
        .cb-title {
            font-family: 'Syne', sans-serif;
            font-size: 2.6cqh;
            line-height: 1;
            margin-bottom: 2cqh;
            flex-shrink: 0;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .cb-subtitle {
            font-size: 1.5cqh;
            margin-top: 1cqh;
            margin-bottom: 1.5cqh;
            flex-shrink: 0;
            opacity: 0.8;
        }

        .cb-signature {
            font-size: 3cqh;
            line-height: 1;
            flex-shrink: 0;
        }

        .cb-footer {
            display: none;
        }

        /* Metadata rows scaling - Allow shrinking */
        .cb-meta-list {
            display: flex;
            flex-direction: column;
            gap: 0;
            flex: 1;
            justify-content: space-evenly;
            overflow: hidden;
        }

        .meta-row {
            margin-bottom: 0;
            padding: 0.1cqh 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            min-height: 0;
            flex-shrink: 0;
        }

        .meta-label {
            font-size: 2cqh;
            margin-bottom: 0;
            line-height: 1.1;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .meta-val {
            font-size: 2.8cqh;
            line-height: 1.1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 1;
            font-weight: 500;
            color: #fff;
        }

        .meta-val.seed-disp {
            font-size: 2cqh !important;
            opacity: 0.7;
        }

        .meta-val.dim-disp {
            font-family: monospace;
            letter-spacing: -0.5px;
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: fill;
            display: block;
        }

        /* TACTILE LAYERS */
        .tactile-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 20;
            mix-blend-mode: overlay;
            opacity: 0.6;
        }

        .tactile-noise {
            position: absolute;
            inset: -50%;
            width: 200%;
            height: 200%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.6' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.1'/%3E%3C/svg%3E");
            opacity: 0.5;
            animation: breathe 10s infinite ease-in-out alternate;
        }

        @keyframes breathe {
            from {
                transform: scale(1);
                opacity: 0.4;
            }

            to {
                transform: scale(1.05);
                opacity: 0.6;
            }
        }

        .tactile-glare {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0) 60%);
            opacity: 0;
            transition: opacity 0.3s;
            mix-blend-mode: soft-light;
        }

        .card-wrapper:hover .tactile-glare {
            opacity: 1;
        }

        /* NAV BTNS */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.1);
            font-size: 3rem;
            cursor: pointer;
            padding: 2rem;
            transition: all 0.3s;
            outline: none;
        }

        .nav-btn:hover {
            color: #fff;
            transform: translateY(-50%) scale(1.1);
        }

        .prev-btn {
            left: 0;
        }

        .next-btn {
            right: 0;
        }

        /* INFO CARD */
        .meta-row {
            width: 100%;
            margin-bottom: 0.5rem;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 0.25rem;
        }

        .meta-label {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #666;
            margin-bottom: 0.15rem;
            font-weight: 700;
        }

        .meta-val {
            font-size: 0.8rem;
            color: #ccc;
            font-family: monospace;
            word-break: break-all;
            line-height: 1.1;
        }

        .meta-val-highlight {
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .font-syne {
            font-family: ui-sans-serif, system-ui;
            font-weight: 800;
            letter-spacing: 1px;
        }

        /* MODALS */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 7000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            backdrop-filter: blur(12px);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-panel {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            width: 340px;
            max-width: 90vw;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
        }

        .close-modal-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: none;
            color: #444;
            font-size: 1.1rem;
            line-height: 1;
            cursor: pointer;
            padding: 5px;
            transition: color 0.2s;
            font-family: system-ui;
        }

        .close-modal-btn:hover {
            color: #fff;
        }

        .modal-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #555;
            margin-bottom: 1.2rem;
            text-align: center;
            border-bottom: 1px solid #222;
            padding-bottom: 0.8rem;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.6rem;
        }

        .option-btn {
            background: #151515;
            padding: 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ddd;
            font-family: monospace;
            font-size: 0.85rem;
            border: 1px solid #222;
            transition: all 0.2s;
        }

        .option-btn:hover {
            background: #222;
            border-color: #555;
            color: #fff;
            transform: translateX(2px);
        }

        .swatches-mini {
            display: flex;
            gap: 4px;
        }

        .swatch-mini {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        .dot-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #FFFFFF;
            box-shadow: 0 0 5px #FFFFFF;
            display: none;
            margin-left: auto;
        }

        .option-btn.active .dot-indicator {
            display: none !important;
        }

        .option-btn.active {
            border-color: #FFFFFF !important;
            color: white;
            background: rgba(255, 255, 255, 0.15) !important;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* SEED EDITOR */
        .seed-input-container {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .seed-input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.9rem;
            border-radius: 8px;
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: #666;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        .action-btn {
            background: #222;
            color: #fff;
            border: 1px solid #333;
            padding: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #333;
            border-color: #666;
        }

        .action-btn.primary {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);

            backdrop-filter: blur(4px);

        .action-btn.primary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* Slick Loading Animation */
        @keyframes loadBlur {
            0% {
                filter: blur(0px);
                opacity: 1;
                transform: scale(1);
            }

            40% {
                filter: blur(12px) brightness(1.2);
                opacity: 0.7;
                transform: scale(0.98);
            }

            100% {
                filter: blur(0px);
                opacity: 1;
                transform: scale(1);
            }
        }

        .loading-canvas {
            animation: loadBlur 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 768px) {
            #generator-controls {
                max-width: 95vw !important;
                flex-wrap: wrap !important;
                gap: 3px !important;
                padding: 3px 6px !important;
                margin-bottom: 18px !important;
                border-radius: 16px !important;
                justify-content: center !important;
            }

            #generator-controls button {
                width: 30px !important;
                height: 30px !important;
                min-width: 28px !important;

                grid-template-columns: 1fr !important;
                inset: 20px !important;

            /* Hide sidebar on mobile */
            #grid-preview-modal .preview-container>div:last-child {
                display: none !important;

            /* Reposition download button below image */
            #grid-preview-modal #prev-dl-btn {

                left: 50% !important;

        @media (max-width: 360px) {

            #generator-controls button {

<body>
    <div id="main-container"
        style="position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden;">
    </div>
    <!-- Loading Indicator -->
    <div id="loading-indicator">
        <div class="loading-square"></div>
        <div class="loading-text">Processing...</div>

    <!-- Seed Info Panel -->
    <div id="seed-info-panel"
        style="position: fixed; bottom: 20px; left: 20px; z-index: 2000; background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 16px 40px 16px; font-family: 'Courier New', monospace; font-size: 11px; color: #ccc; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none;">

    <div id="generator-controls">
        <button id="infoToggleBtn" title="Toggle Info (W)">W</button>
        <style>
            /* UNIFIED CONTROL BAR (Mobile & Desktop) */
            #generator-controls {
                display: none;
                position: fixed;
                bottom: 4px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 5000;

                /* Layout */
                height: 48px;
                width: auto;
                max-width: 95vw;

                /* Styling */
                background: rgba(15, 15, 15, 0.85);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 14px;
                padding: 0 10px;

                /* Flex Content */
                flex-direction: row;
                flex-wrap: nowrap !important;
                align-items: center;
                justify-content: center;
                gap: 4px;

                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);

                /* Scrolling Logic */
                /* Scrolling Logic disabled to allow popups */
                overflow: visible;
                -webkit-overflow-scrolling: touch;
            }

            #generator-controls::-webkit-scrollbar {
                display: none;
            }

            #generator-controls.active {
                display: flex !important;
                animation: fadeInBottom 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            }

            @media (max-width: 400px),
            (max-height: 400px) {
                #generator-controls {
                    display: none !important;
                }
            }

            /* Enable Horizontal Scrolling on Mobile */
            @media (max-width: 768px) {
                #generator-controls {
                    max-width: 95vw !important;
                    flex-wrap: nowrap !important;
                    justify-content: flex-start !important;
                    overflow-x: auto !important;
                    overflow-y: hidden !important;
                    -webkit-overflow-scrolling: touch;
                    padding-left: 10px !important;
                    padding-right: 10px !important;
                    scrollbar-width: none;
                    /* Firefox */
                }

                #generator-controls::-webkit-scrollbar {
                    display: none;
                }
            }

            /* UNIFIED BUTTON STYLES */
            #generator-controls button,
            #cust-bar button {
                flex: 0 0 38px;
                min-width: 38px;
                height: 38px;

                /* Content */
                padding: 0;
                margin: 0;
                border: none;
                background: rgba(255, 255, 255, 0.06);
                border-radius: 8px;
                color: rgba(255, 255, 255, 0.9);

                font-family: inherit;
                font-size: 11px;
                font-weight: 600;
                cursor: pointer;

                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.2s, transform 0.1s;
            }

            #generator-controls button:hover,
            #cust-bar button:hover {
                background: rgba(255, 255, 255, 0.15);
            }

            #generator-controls button:active,
            #cust-bar button:active {
                background: rgba(255, 255, 255, 0.25);
                transform: scale(0.96);
            }

            @keyframes fadeInBottom {
                from {
                    opacity: 0;
                    transform: translate(-50%, 30px);
                }

                to {
                    opacity: 1;
                    transform: translate(-50%, 0);
                }
            }

            /* Main Container Layout Shift */
            #main-container {
                width: 100vw;
                height: 100vh;
                position: relative;
            }

            /* When controls are visible, shift the ABSOLUTE centered card wrapper up */
            body.controls-visible .card-wrapper {
                margin-top: -20px !important;
                /* The sweet spot: clears bar, not too high */
                transition: margin-top 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            }

            .fav-active {
                color: #FFD700 !important;
                text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
                background: rgba(255, 215, 0, 0.1) !important;
                border-color: rgba(255, 215, 0, 0.4) !important;
            }

            #collection-list {
                display: grid;
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .collection-item {
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 8px;
                padding: 10px;
                display: flex;
                flex-direction: column;
                gap: 6px;
                cursor: pointer;
                transition: all 0.2s;
            }

            .collection-item:hover {
                background: rgba(255, 255, 255, 0.1);
                border-color: rgba(255, 255, 255, 0.2);
                transform: translateX(4px);
            }

            .collection-item-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .collection-item-title {
                font-family: monospace;
                font-size: 10px;
                color: #888;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 200px;
            }

            .collection-item-delete {
                color: #ff4444;
                cursor: pointer;
                font-size: 14px;
                padding: 4px;
                line-height: 1;
            }

            .collection-item-delete:hover {
                color: #ff8888;
            }

            .collection-item-meta {
                display: flex;
                gap: 12px;
                font-size: 11px;
                color: #ccc;
            }

            /* Responsive tweaks */
            @media (max-width: 600px) {
                #generator-controls {
                    padding: 0 16px;
                }

                #generator-controls button,
                #cust-bar button {
                    font-size: 11px;
                }

                body.controls-visible .card-wrapper {
                    margin-top: -20px !important;
                }
            }
        </style>

        function appendGridItems(grid, cols, count) {

            let w = 1200, h = 1800;
            if (gridRatio) {
                w = gridRatio.w;
                h = gridRatio.h;
            } else if (items[0] && items[0]._engine) {
                w = items[0]._engine.canvas.width;
                h = items[0]._engine.canvas.height;

            const prevImg = document.getElementById('grid-preview-img');
            const prevMeta = document.getElementById('preview-meta-content');
            const dlBtn = document.getElementById('prev-dl-btn');
            for (let i = 0; i < count; i++) {
                const wrap = document.createElement('div');
                wrap.style.cssText = `position: relative; background: transparent; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 1px solid #222; overflow:hidden; box-sizing: border-box; transition: transform 0.2s;`;

                wrap.onmouseleave = () => { wrap.style.transform = 'translateY(0)'; wrap.style.borderColor = '#222'; };
                const cvs = document.createElement('canvas');
                cvs.style.cssText = 'width:100% !important; height:100% !important; object-fit:fill !important; display:block !important;';
                cvs.width = w;
                cvs.height = h;
                wrap.appendChild(cvs);
                grid.appendChild(wrap);
                setTimeout(() => {
                    try {
                        const eng = new PaintEngine(cvs);
                        eng.setCanvasSize(w, h);
                        eng.mainSeed = "GRID_" + Date.now() + "_" + Math.random();
                        if (items[activeIndex] && items[activeIndex]._engine) {
                            const mainEngine = items[activeIndex]._engine;
                            eng.frameMode = mainEngine.frameMode;
                            eng.textureMode = mainEngine.textureMode;
                            eng.brushMode = mainEngine.brushMode;
                        }
                        eng.fullRandomize(gridAllowedTags);
                        wrap.onclick = () => openGridPreview(eng.getMeta(), cvs);
                    } catch (e) {
                        console.error("Grid Render Error", e);
                    }
                }, i * 50);
            }
        }

                colors.forEach((c, idx) => {
                    const sBtn = document.createElement('div');
                    sBtn.style.cssText = `background:${c}; height:32px; border-radius:6px; cursor:pointer; border:1px solid rgba(255,255,255,0.1); box-sizing:border-box; transition: transform 0.1s;`;
                    if (idx === engine.frameColorIndex) {
                        sBtn.style.boxShadow = '0 0 0 2px #fff';
                        sBtn.style.borderColor = 'transparent';
                        sBtn.style.transform = 'scale(1.1)';
                    }
                    sBtn.onclick = () => {
                        applyLoadingAnimation(() => {
                            items.forEach(item => {
                                item._engine.frameColorIndex = idx;
                                item._engine.drawArt();
                                item._updateMeta(item._engine.getMeta());
                            });
                            rebuildFrameModal();
                            updateFavBtnState();
                        }, true);
                    };
                    swatches.appendChild(sBtn);
                });

                // Add Extra Colors (White, Off-White, Black)
                EXTRA_FRAME_COLORS.forEach((extra) => {
                    const sBtn = document.createElement('div');
                    sBtn.style.cssText = `background:${extra.color}; height:32px; border-radius:6px; cursor:pointer; border:1px solid rgba(255,255,255,0.1); box-sizing:border-box; transition: transform 0.1s;`;
                    if (extra.id === engine.frameColorIndex) {
                        sBtn.style.boxShadow = '0 0 0 2px #fff';
                        sBtn.style.borderColor = 'transparent';
                        sBtn.style.transform = 'scale(1.1)';
                    }
                    sBtn.onclick = () => {
                        applyLoadingAnimation(() => {
                            items.forEach(item => {
                                item._engine.frameColorIndex = extra.id;
                                item._engine.drawArt();
                                item._updateMeta(item._engine.getMeta());
                            });
                            rebuildFrameModal();
                            updateFavBtnState();
                        }, true);
                    };
                    swatches.appendChild(sBtn);
                });

                listEl.appendChild(swatches);
            }
        }
        rebuildFrameModal();

        function openModal(modalId) {
            updateModalActiveStates();
            closeAll();
            const modal = document.getElementById(modalId);
            const panel = modal.querySelector('.modal-panel');
            const wrapper = (activeIndex >= 0) ? items[activeIndex] : null;
            const grid = document.getElementById('grid-view-container');
            const isGrid = grid && (grid.style.display === 'grid' || grid.style.display === 'block');

            // Reset styles to defaults first
            panel.style.margin = '';
            panel.style.position = '';
            panel.style.top = '';
            panel.style.left = '';
            panel.style.transform = '';

            if (wrapper && !isGrid) {
                // Aligned to artwork on Landing Page
                const rect = wrapper.getBoundingClientRect();
                const centerY = rect.top + (rect.height / 2);
                panel.style.position = 'absolute';
                panel.style.margin = '0';
                panel.style.left = '50%';
                panel.style.top = centerY + 'px';
                panel.style.transform = 'translate(-50%, -50%)';
            } else {
                // Natural flex centering (defined in .modal-overlay CSS)
                panel.style.position = 'relative';
            }
            modal.classList.add('active');
        }

        /* Redundant listeners removed - handled in setup sections above */
        document.getElementById('infoToggleBtn').onclick = () => {
            const panel = document.getElementById('seed-info-panel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        };
        const infoPanel = document.getElementById('seed-info-panel');
        if (window.innerWidth < 768) {
            infoPanel.classList.add('collapsed');
        }
        infoPanel.onclick = (e) => {
            if (window.innerWidth < 768 && infoPanel.classList.contains('collapsed')) {
                infoPanel.classList.remove('collapsed');
            }
        };
        const header = infoPanel.querySelector('div');
        if (header) {
            header.style.cursor = 'pointer';
            header.onclick = (e) => {
                if (window.innerWidth < 768) {
                    e.stopPropagation();
                    infoPanel.classList.add('collapsed');
                }
            };
        }
        ['info-seed', 'info-ptag', 'info-itag', 'info-master'].forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    el.blur();
                }
            });
            el.addEventListener('blur', () => {
                const item = items[0];
                const eng = item._engine;
                if (id === 'info-master') {
                    const val = el.value.trim();
                    const match = val.match(/^P(\d+)(z\d+)B(\d+)M(\d+)T(\d+)F(\d+)S(.+)$/);
                    if (match) {
                        const [full, p, i, bg, m, t, f, s] = match;
                        eng.paletteTag = p.padStart(2, '0');
                        eng.iterationTag = i;
                        eng.bgMode = parseInt(bg, 10);
                        eng.brushMode = parseInt(m, 10);
                        eng.textureMode = parseInt(t, 10);
                        eng.frameMode = parseInt(f, 10);
                        eng.mainSeed = s;
                        PaintEngine.updateGlobalState('brush', eng.brushMode);
                        PaintEngine.updateGlobalState('tex', eng.textureMode);
                        PaintEngine.updateGlobalState('frame', eng.frameMode);
                    } else {
                        return;
                    }
                } else {
                    eng.mainSeed = document.getElementById('info-seed').value.trim();
                    eng.paletteTag = document.getElementById('info-ptag').value.trim().padStart(2, '0');
                    eng.iterationTag = document.getElementById('info-itag').value.trim();
                }
                eng.composition = null;
                eng.calculateState();
                eng.drawArt();
                eng.pushHistory();
                item._updateMeta(eng.getMeta());
            });
            el.addEventListener('focus', () => {
                if (id === 'info-master') el.style.borderColor = '#fff';
                else el.style.borderBottomColor = '#fff';
            });
            el.addEventListener('blur', () => {
                if (id === 'info-master') el.style.borderColor = 'rgba(255,255,255,0.1)';
                else el.style.borderBottomColor = 'transparent';
            }, true);
        });
        document.getElementById('info-master').addEventListener('click', (e) => {
            if (document.activeElement !== e.target) {
                copyToClipboard(e.target.value, e.target);
            }
        });
        function copyToClipboard(text, element) {
            navigator.clipboard.writeText(text).then(() => {
                const originalColor = element.style.color;
                element.style.color = '#0f0';
                setTimeout(() => { element.style.color = originalColor; }, 200);
            }).catch(err => console.error('Copy failed:', err));
        }
        document.querySelectorAll('.copy-field').forEach(field => {
            field.addEventListener('click', () => {
                copyToClipboard(field.textContent, field);
            });
        });
        document.getElementById('copy-all-btn').addEventListener('click', () => {
            const master = document.getElementById('info-master').value;
            navigator.clipboard.writeText(master).then(() => {
                const btn = document.getElementById('copy-all-btn');
                btn.textContent = 'COPIED!';
                btn.style.background = '#0f0';
                btn.style.color = '#000';
                setTimeout(() => {
                    btn.textContent = 'COPY';
                    btn.style.background = '#222';
                    btn.style.color = '#fff';
                }, 1000);
            });
        });
        document.getElementById('load-params-btn').onclick = () => {
            const masterInput = document.getElementById('info-master');
            const val = masterInput.value.trim();
            const item = items[0];
            const eng = item._engine;
            const match = val.match(/^P(\d+)(z\d+)B(\d+)M(\d+)T(\d+)F(\d+)(?:C(\d+))?S(.+)$/);
            if (match) {
                const [full, p, i, bg, m, t, f, c, s] = match;
                eng.paletteTag = p.padStart(2, '0');
                eng.iterationTag = i;
                eng.bgMode = parseInt(bg, 10);
                eng.brushMode = parseInt(m, 10);
                eng.textureMode = parseInt(t, 10);
                eng.frameMode = parseInt(f, 10);
                if (c !== undefined) eng.frameColorIndex = parseInt(c, 10);
                eng.mainSeed = s;
                PaintEngine.updateGlobalState('brush', eng.brushMode);
                PaintEngine.updateGlobalState('tex', eng.textureMode);
                PaintEngine.updateGlobalState('frame', eng.frameMode);
                eng.composition = null;
                eng.calculateState();
                eng.drawArt();
                eng.pushHistory();
                item._updateMeta(eng.getMeta());
                const btn = document.getElementById('load-params-btn');
                const orig = btn.textContent;
                btn.textContent = 'LOADED';
                btn.style.background = '#fff';
                btn.style.color = '#000';
                setTimeout(() => {
                    btn.textContent = orig;
                    btn.style.background = '#222';
                    btn.style.color = '#fff';
                }, 500);
            } else {
                masterInput.style.borderColor = 'red';
                setTimeout(() => masterInput.style.borderColor = 'rgba(255,255,255,0.1)', 1000);
            }
        };
        window.addEventListener('resize', () => {
            requestAnimationFrame(() => {
                if (items[0] && items[0]._engine) items[0]._engine.onResize(items[0]._engine.canvas.width, items[0]._engine.canvas.height);
            });
        });

        const htmlBtn = document.getElementById('htmlBtn');
        if (htmlBtn) {
            htmlBtn.onclick = (e) => {
                const existing = document.getElementById('html-popup');
                if (existing) existing.remove();

                const htmlPopup = document.createElement('div');
                htmlPopup.id = 'html-popup';
                Object.assign(htmlPopup.style, {
                    position: 'fixed', inset: '0', background: 'rgba(10,10,10,0.85)',
                    backdropFilter: 'blur(12px)', webkitBackdropFilter: 'blur(12px)',
                    zIndex: '9999', display: 'flex', alignItems: 'center', justifyContent: 'center',
                    cursor: 'pointer'
                });

                const panel = document.createElement('div');
                Object.assign(panel.style, {
                    width: '88vmin', height: '88vmin', maxWidth: '92vw', maxHeight: '92vh',
                    background: 'rgba(12, 12, 12, 0.96)', border: '1px solid rgba(255, 255, 255, 0.08)',
                    borderRadius: '4px', padding: '2.2vmin', overflow: 'auto', color: '#888',
                    fontFamily: 'monospace', fontSize: '11px', lineHeight: '1.4', whiteSpace: 'pre-wrap',
                    cursor: 'auto', boxShadow: '0 40px 80px rgba(0,0,0,0.95)', position: 'relative',
                    boxSizing: 'border-box'
                });

                const closeBtn = document.createElement('button');
                closeBtn.innerHTML = '×';
                Object.assign(closeBtn.style, {
                    position: 'absolute', top: '10px', right: '10px', background: 'transparent',
                    border: 'none', color: '#444', fontSize: '1.4rem', cursor: 'pointer', padding: '5px',
                    zIndex: '10', lineHeight: '1'
                });
                closeBtn.onmouseover = () => closeBtn.style.color = '#fff';
                closeBtn.onmouseout = () => closeBtn.style.color = '#444';
                closeBtn.onclick = () => htmlPopup.remove();

                panel.appendChild(closeBtn);

                const content = document.createElement('div');
                content.textContent = document.documentElement.outerHTML;
                panel.appendChild(content);

                panel.onclick = (e) => e.stopPropagation();

                htmlPopup.appendChild(panel);
                document.body.appendChild(htmlPopup);

                htmlPopup.addEventListener('click', () => htmlPopup.remove());
            };
        }

        document.querySelectorAll('.close-modal-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const modal = e.target.closest('.modal-overlay');
                if (modal) {
                    modal.classList.remove('active');
                }
            });
        });

        document.getElementById('custBtn').onclick = (e) => {
            e.stopPropagation();
            const bar = document.getElementById('cust-bar');
            const isActive = bar.style.display === 'flex';

            if (isActive) {
                bar.style.opacity = '0';
                bar.style.transform = 'translateX(-50%) translateY(10px)';
                bar.style.pointerEvents = 'none';
                setTimeout(() => { bar.style.display = 'none'; }, 200);
            } else {
                bar.style.display = 'flex';
                // Small delay to allow display:flex to apply before opacity transition
                requestAnimationFrame(() => {
                    bar.style.opacity = '1';
                    bar.style.transform = 'translateX(-50%) translateY(0)';
                    bar.style.pointerEvents = 'auto';
                });
            }
            document.getElementById('custBtn').classList.toggle('active', !isActive);
        };

        const custCloseBtn = document.getElementById('custCloseBtn');
        if (custCloseBtn) {
            custCloseBtn.onclick = (e) => {
                e.stopPropagation();
                const bar = document.getElementById('cust-bar');
                bar.style.opacity = '0';
                bar.style.transform = 'translateX(-50%) translateY(10px)';
                bar.style.pointerEvents = 'none';
                setTimeout(() => { bar.style.display = 'none'; }, 200);
                document.getElementById('custBtn').classList.remove('active');
            };
        }
        // Close cust bar when clicking elsewhere
        window.addEventListener('click', (e) => {
            const bar = document.getElementById('cust-bar');
            const btn = document.getElementById('custBtn');
            if (bar && bar.style.display === 'flex' && !bar.contains(e.target) && e.target !== btn) {
                // Don't close if interacting with a modal
                if (e.target.closest('.modal-panel') || e.target.closest('.modal-overlay')) return;

                bar.style.opacity = '0';
                bar.style.transform = 'translateX(-50%) translateY(10px)';
                bar.style.pointerEvents = 'none';
                setTimeout(() => { bar.style.display = 'none'; }, 200);
                btn.classList.remove('active');
            }
        });

        /* Consolidated into window.onclick at setup */
        async function exportCollection() {
            if (favorites.length === 0) return;
            if (typeof JSZip === 'undefined') {
                alert("Export library is loading. Please try again in a moment.");
                return;
            }

            if (!confirm(`Export ${favorites.length} items to ZIP?\nThis will re-render them at high quality.`)) return;

            closeAll();
            applyLoadingAnimation(async () => {
                try {
                    const zip = new JSZip();
                    const folderName = `PaintEngine_Collection_${Date.now()}`;
                    const folder = zip.folder(folderName);

                    // Metadata JSON
                    folder.file("metadata.json", JSON.stringify(favorites, null, 2));

                    // Render images
                    const total = favorites.length;
                    const loaderText = document.querySelector('#loading-indicator div');
                    const originalText = loaderText.innerText;

                    for (let i = 0; i < total; i++) {
                        loaderText.innerText = `RENDERING ${i + 1}/${total}`;
                        const fav = favorites[i];

                        const cvs = document.createElement('canvas');
                        const w = Number(fav.w) || 1200;
                        const h = Number(fav.h) || 1800;
                        cvs.width = w;
                        cvs.height = h;

                        const eng = new PaintEngine(cvs);
                        // Parse master seed
                        const master = fav.master;
                        const pMatch = master.match(/P(\d+)/);
                        const iMatch = master.match(/z(\d+)/);
                        const bMatch = master.match(/B(\d+)/);
                        const mMatch = master.match(/M(\d+)/);
                        const tMatch = master.match(/T(\d+)/);
                        const fMatch = master.match(/F(\d+)/);
                        const cMatch = master.match(/C(\d+)/);
                        const sMatch = master.match(/S(\d+)/);

                        if (pMatch) eng.paletteTag = pMatch[1];
                        if (iMatch) eng.iterationTag = 'z' + iMatch[1];
                        if (bMatch) eng.bgMode = parseInt(bMatch[1]);
                        if (mMatch) eng.brushMode = parseInt(mMatch[1]);
                        if (tMatch) eng.textureMode = parseInt(tMatch[1]);
                        if (fMatch) eng.frameMode = parseInt(fMatch[1]);
                        if (cMatch) eng.frameColorIndex = parseInt(cMatch[1]);
                        if (sMatch) eng.mainSeed = sMatch[1];

                        eng.setCanvasSize(w, h);
                        eng.calculateState();
                        eng.drawArt();

                        await new Promise(resolve => {
                            cvs.toBlob(blob => {
                                const filename = `${fav.master}_${w}x${h}.png`;
                                folder.file(filename, blob);
                                resolve();
                            }, 'image/png');
                        });
                        // Small microtask break
                        await new Promise(r => setTimeout(r, 0));
                    }

                    loaderText.innerText = "ZIPPING...";
                    const content = await zip.generateAsync({ type: "blob" });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(content);
                    link.download = `${folderName}.zip`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    loaderText.innerText = originalText;
                } catch (e) {
                    console.error("Export Error", e);
                    alert("Export failed: " + e.message);
                }
            }, true);
        }

        function deleteAllFavorites() {
            if (favorites.length === 0) return;
            if (!confirm("Are you sure you want to DELETE ALL items from your collection?\nThis action cannot be undone.")) return;

            favorites = [];
            localStorage.setItem('pe_favorites', JSON.stringify(favorites));
            rebuildCollectionModal();
            updateFavBtnState();

            // Also clear grid if we are in collection mode
            if (gridMode === 'collection') {
                const grid = document.getElementById('grid-view-container');
                if (grid) {
                    grid.innerHTML = '';
                    updateGridCols(); // Will handle empty state text if needed, or just be empty
                }
            }
        }
    </script>
